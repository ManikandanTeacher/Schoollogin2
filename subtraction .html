<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Kids Subtraction Quiz</title>

<style>
body{
font-family:Arial;
background:#fff3cd;
text-align:center;
}

h1{color:#ff5722;}

button{
padding:12px 18px;
font-size:18px;
border:none;
border-radius:10px;
background:#4caf50;
color:white;
margin:6px;
}

.option{
background:#03a9f4;
width:120px;
}

canvas{
border:3px dashed #444;
background:white;
margin:15px;
touch-action:none;
}

#game{display:none;}
</style>
</head>

<body>

<h1>➖ Subtraction Fun Quiz 🧸</h1>

<div id="menu">
<h2>Select Level</h2>
<button onclick="start(1)">Level 1 (1–10)</button>
<button onclick="start(2)">Level 2 (11–20)</button>
</div>

<div id="game">

<h2 id="round"></h2>
<h2 id="question"></h2>

<canvas id="board" width="320" height="200"></canvas><br>

<button onclick="clearCanvas()">Clear Lines</button><br>

<div id="options"></div>

<h3 id="score"></h3>

</div>

<script>

const emojis=[
"🍎","🍓","🍌","🍉","🍇","🍒","🥕","🍪","🍩","🧸",
"🐰","🐶","🐱","🐸","🐥","⭐","🌸","🌻","🍭","🎈",
"🚗","⚽","🎁","🦋","🍬"
];

const level1=[
[5,2],[6,3],[7,4],[8,3],[9,5],[10,6],[4,1],[6,2],[8,5],[7,3],
[9,4],[10,7],[5,1],[6,4],[7,2],[8,4],[9,6],[10,5],[4,2],[6,1],
[7,5],[8,6],[9,2],[10,3],[5,3]
];

const level2=[
[12,3],[14,5],[15,7],[16,8],[18,9],[20,6],[13,4],[17,5],[19,7],[11,3],
[14,6],[15,5],[16,7],[18,4],[20,8],[12,5],[13,6],[17,8],[19,5],[11,4],
[14,7],[15,6],[16,5],[18,7],[20,9]
];

let questions=[],index=0,score=0;
let a,b,correct,currentEmoji;

const canvas=document.getElementById("board");
const ctx=canvas.getContext("2d");

let drawing=false,lastX=0,lastY=0;

/* ---------- DRAW SUPPORT ---------- */

canvas.addEventListener("mousedown",startDraw);
canvas.addEventListener("mousemove",draw);
canvas.addEventListener("mouseup",stopDraw);
canvas.addEventListener("mouseleave",stopDraw);

canvas.addEventListener("touchstart",e=>{
e.preventDefault();
const r=canvas.getBoundingClientRect();
startDraw({offsetX:e.touches[0].clientX-r.left,offsetY:e.touches[0].clientY-r.top});
});

canvas.addEventListener("touchmove",e=>{
e.preventDefault();
const r=canvas.getBoundingClientRect();
draw({offsetX:e.touches[0].clientX-r.left,offsetY:e.touches[0].clientY-r.top});
});

canvas.addEventListener("touchend",stopDraw);

function startDraw(e){
drawing=true;
[lastX,lastY]=[e.offsetX,e.offsetY];
}

function draw(e){
if(!drawing) return;
ctx.strokeStyle="red";
ctx.lineWidth=4;
ctx.beginPath();
ctx.moveTo(lastX,lastY);
ctx.lineTo(e.offsetX,e.offsetY);
ctx.stroke();
[lastX,lastY]=[e.offsetX,e.offsetY];
}

function stopDraw(){drawing=false;}

/* ---------- GAME ---------- */

function start(lvl){
questions=lvl===1?level1:level2;
index=0;
score=0;
document.getElementById("menu").style.display="none";
document.getElementById("game").style.display="block";
nextQuestion();
}

function nextQuestion(){

if(index>=25){
alert("Finished!\nScore: "+score+"/25");
location.reload();
return;
}

[a,b]=questions[index];
correct=a-b;
currentEmoji=emojis[Math.floor(Math.random()*emojis.length)];

document.getElementById("round").innerHTML="Question "+(index+1)+" / 25";
document.getElementById("question").innerHTML=a+" − "+b+" = ?";
document.getElementById("score").innerHTML="Score: "+score;

clearCanvas();
drawEmojis(a);
showOptions();

index++;
}

function drawEmojis(n){
ctx.font="32px serif";
let x=20,y=50;
for(let i=0;i<n;i++){
ctx.fillText(currentEmoji,x,y);
x+=35;
if(x>280){x=20;y+=45;}
}
}

function clearCanvas(){
ctx.clearRect(0,0,canvas.width,canvas.height);
if(a) drawEmojis(a);
}

function showOptions(){
let opts=[correct,correct+1,correct-1];
opts.sort(()=>Math.random()-0.5);
let box=document.getElementById("options");
box.innerHTML="";
opts.forEach(v=>{
let b=document.createElement("button");
b.className="option";
b.innerHTML=v;
b.onclick=()=>check(v);
box.appendChild(b);
});
}

function check(v){
if(v===correct){
alert("Great ⭐");
score++;
}else{
alert("Correct answer: "+correct);
}
nextQuestion();
}

</script>

</body>
</html>
